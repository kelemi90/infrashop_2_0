server {
    listen 80;
#    server_name infrashop.vectorama.fi;
#    return 301 https://$host$request_uri;
#}

#server {
#    listen 443 ssl;
#    server_name infrashop.vectorama.fi;
    server_name _;

    # configure your cert paths (Let's Encrypt)
    # ssl_certificate /etc/letsencrypt/live/infrashop.vectorama.fi/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/infrashop.vectorama.fi/privkey.pem;

    # Security headers (adjust as needed)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # proxy api
    # proxy api
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # proxy images to backend (backend serves /images via express.static)
    location /images/ {
        proxy_pass http://backend:3000/images/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }


    # serve frontend static
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}