name: Push rotated secrets to server (manual)

on:
  workflow_dispatch:

jobs:
  push-secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: 'none'
    steps:
      - name: Checkout (no code needed)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Build .env to deploy (in-memory)
        run: |
          cat > env_to_write <<'EOF'
          POSTGRES_PASSWORD=${{ secrets.NEW_POSTGRES_PASSWORD }}
          JWT_SECRET=${{ secrets.NEW_JWT_SECRET }}
          DATABASE_URL=postgresql://infrashop:${{ secrets.NEW_POSTGRES_PASSWORD }}@db:5432/infrashop
          EOF
          chmod 600 env_to_write

      - name: Upload .env to server (atomic)
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_PATH: ${{ secrets.REMOTE_ENV_PATH || '/home/kelmi/infrashop_2_0/.env' }}
        run: |
          set -euo pipefail
          scp -o StrictHostKeyChecking=no env_to_write "$DEPLOY_USER@$DEPLOY_HOST:/tmp/infrashop.env.tmp"
          ssh -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST" \
            "mv /tmp/infrashop.env.tmp '$REMOTE_PATH' && chmod 600 '$REMOTE_PATH'"

      - name: Restart backend service
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd /home/kelmi/infrashop_2_0 && docker compose up -d --build backend"

      - name: Confirm health endpoint (from runner)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          # Attempt to reach the health endpoint over IPv4 via the server's public interface.
          # This step is optional and may fail if 127.0.0.1 is only reachable from the server.
          echo "Trigger complete. Please verify /api/health and login on the server after deploy."
