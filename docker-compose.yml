services:
  db:
    image: postgres:15
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-infrashop}
      POSTGRES_USER: ${POSTGRES_USER:-infrashop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./backend/varasto.csv:/varasto.csv
    ports:
      - "5432:5432"
    networks:
      - infranet

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - images-data:/app/public/images
    depends_on:
      - db
    ports:
      - "3000:3000"
    networks:
      - infranet

  frontend:
    build: ./frontend
    depends_on:
      - backend
    networks:
      - infranet

  nginx:
    image: nginx:stable
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/infrashop.conf:/etc/nginx/conf.d/default.conf:ro
      # mount Let's Encrypt certs from the host (certbot will write here)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # optional webroot used by certbot for http-01 challenges
      - ./nginx/html:/var/www/html:ro
    depends_on:
      - frontend
      - backend
    networks:
      - infranet

volumes:
  db-data:
  images-data:

networks:
  infranet:
