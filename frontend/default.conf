server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Serve static assets normally and fall back to index.html for SPA routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(?:css|js|png|jpg|jpeg|svg|ico|json|txt)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
